## JVM — reduced from 8G to 4G; 8G per build with no daemon causes swapping
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.java.home=C:/Program Files/Java/jdk-17

## Android
android.useAndroidX=true
android.enableJetifier=false

## Gradle behaviour
## daemon=false avoids stale daemon cache-lock issues on Windows
org.gradle.daemon=false
## vfs.watch=false prevents metadata.bin corruption on Windows (root cause of 3-day issue)
org.gradle.vfs.watch=false
## configuration-cache=false prevents config-cache corruption
org.gradle.configuration-cache=false
## parallel=false is safer when daemon=false to avoid JVM race conditions on Windows
org.gradle.parallel=false
